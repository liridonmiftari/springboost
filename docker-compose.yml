version: "3.9"

services:
  db:
    image: postgres:16
    container_name: spring-bbb-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: spring_bbb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    command: sh -c "npm install && npm run dev"
    environment:
      # Inside the Docker network, use the service name "db" instead of localhost
      DATABASE_URL: postgres://app:app@db:5432/spring_bbb
      PORT: "5000"
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  db_data:

